name: SMTP L5
on:
  schedule: [{cron: '0 */3 * * *'}]
  workflow_dispatch:
permissions: {contents: write}
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install dnspython
      - name: SMTP
        run: |
          python3 -c "
          import csv, smtplib, dns.resolver, os
          def ok(e):
              try:
                  d=e.split('@')[1]; mx=str(dns.resolver.resolve(d,'MX')[0].exchange)
                  s=smtplib.SMTP(mx,25,timeout=8); s.helo(); s.mail('v@x.net')
                  c,_=s.rcpt(e); s.quit(); return c==250
              except: return False
          for m in ['np','gt','y@']:
              l4=f'L4_{m}.csv'; l5=f'L5_{m}.csv'
              if not os.path.exists(l4): continue
              l4s=set(); l5s=set()
              with open(l4) as f:
                  for l in f.readlines()[1:]:
                      if l.strip(): l4s.add(l.strip())
              if os.path.exists(l5):
                  with open(l5) as f:
                      for l in f.readlines()[1:]:
                          if l.strip(): l5s.add(l.strip())
              new=[]
              for e in l4s:
                  if e in l5s: continue
                  print(f'Test: {e}')
                  if ok(e): l5s.add(e); new.append(e); print('  ✅')
                  else: print('  ❌')
              if new:
                  with open(l5,'w',newline='') as f:
                      w=csv.writer(f); w.writerow(['email'])
                      for e in sorted(l5s): w.writerow([e])
                  print(f'✅ {m}: +{len(new)} L5')
          "
      - name: Commit
        run: |
          git config user.name 'QWANTUM'
          git config user.email 'q@q.com'
          git add L5_*.csv
          git commit -m "✅ L5 $(date +%Y%m%d-%H%M)" || echo "Rien"
          git pull origin main --rebase || true
          git push origin main
